<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EduBot — Upload</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#150810;--primary:#F43F5E;--secondary:#F97316;--pg:rgba(244,63,94,0.65);--sg:rgba(249,115,22,0.5);--border:rgba(244,63,94,0.15);--border2:rgba(255,255,255,0.07);--text:#FFF1F2;--muted:rgba(253,164,175,0.7);--muted2:rgba(255,255,255,0.45);--font:'Plus Jakarta Sans',system-ui,sans-serif;}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--font);display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden}
.orb{position:fixed;border-radius:50%;pointer-events:none}
.o1{width:400px;height:400px;background:radial-gradient(circle,rgba(244,63,94,0.18),transparent 70%);top:-100px;right:-80px}
.o2{width:300px;height:300px;background:radial-gradient(circle,rgba(249,115,22,0.14),transparent 70%);bottom:-60px;left:-40px}
.card{background:rgba(244,63,94,0.06);backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:20px;padding:36px 32px;width:100%;max-width:440px;position:relative;z-index:1;text-align:center}
.brand-text{font-size:22px;font-weight:800;color:var(--text);display:block;margin-bottom:20px}
.brand-text span{background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
h1{font-size:20px;font-weight:700;margin-bottom:8px}
p{font-size:14px;color:var(--muted);margin-bottom:24px;line-height:1.6}
.zone{border:2px dashed rgba(244,63,94,0.25);border-radius:14px;padding:40px 20px;cursor:pointer;transition:all 0.2s;margin-bottom:16px}
.zone:hover{border-color:rgba(244,63,94,0.5);background:rgba(244,63,94,0.05)}
.zone-icon{font-size:40px;margin-bottom:10px}
.zone-text{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px}
.zone-sub{font-size:12px;color:var(--muted2)}
input[type=file]{display:none}
.btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--pg),var(--sg));border:1px solid rgba(244,63,94,0.4);border-radius:10px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);transition:opacity 0.2s}
.btn:hover{opacity:0.88}
.back{display:block;margin-top:16px;font-size:13px;color:var(--muted2);text-decoration:none}
.back:hover{color:var(--text)}
</style>
</head>
<body>
<div class="orb o1"></div>
<div class="orb o2"></div>
<div class="card">
  <span class="brand-text">Edu<span>Bot</span></span>
  <h1>Upload tài liệu</h1>
  <p>Tải lên PDF hoặc hình ảnh — AI sẽ đọc và giúp bạn học từ tài liệu đó.</p>
  <div class="zone" onclick="document.getElementById('fi').click()">
    <div class="zone-icon">📄</div>
    <div class="zone-text">Nhấn để chọn file</div>
    <div class="zone-sub">PDF, JPG, PNG · Tối đa 100MB</div>
  </div>
  <input type="file" id="fi" accept=".pdf,.jpg,.jpeg,.png,.gif,.webp" onchange="onFile(this.files[0])"/>
  <button class="btn" onclick="document.getElementById('fi').click()">Chọn file →</button>
  <a href="/app" class="back">← Quay lại ứng dụng</a>
</div>
<script>
function onFile(f){if(!f)return;window.location.href='/app?upload=1';}
</script>
</body>
</html>
