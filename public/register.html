<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EduBot — Đăng ký</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#150810;--primary:#F43F5E;--secondary:#F97316;--pg:rgba(244,63,94,0.65);--sg:rgba(249,115,22,0.5);--card:rgba(244,63,94,0.07);--border:rgba(244,63,94,0.15);--border2:rgba(255,255,255,0.07);--text:#FFF1F2;--muted:rgba(253,164,175,0.7);--muted2:rgba(255,255,255,0.45);--font:'Plus Jakarta Sans',system-ui,sans-serif;}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--font);display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden}
.orb{position:fixed;border-radius:50%;pointer-events:none}
.o1{width:500px;height:500px;background:radial-gradient(circle,rgba(244,63,94,0.18),transparent 70%);top:-150px;right:-100px}
.o2{width:350px;height:350px;background:radial-gradient(circle,rgba(249,115,22,0.14),transparent 70%);bottom:-80px;left:-60px}
.card{background:rgba(244,63,94,0.06);backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:20px;padding:36px 32px;width:100%;max-width:400px;position:relative;z-index:1}
.lang-wrap{display:flex;justify-content:center;background:rgba(255,255,255,0.05);border:1px solid var(--border2);border-radius:20px;overflow:hidden;width:fit-content;margin:0 auto 24px}
.lb{padding:6px 16px;font-size:12px;font-weight:600;border:none;background:transparent;color:var(--muted2);cursor:pointer;font-family:var(--font)}
.lb.on{background:linear-gradient(135deg,var(--pg),var(--sg));color:#fff}
.brand{text-align:center;margin-bottom:8px}
.brand-text{font-size:26px;font-weight:800;color:var(--text)}
.brand-text span{background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.title{font-size:20px;font-weight:700;text-align:center;margin-bottom:4px}
.subtitle{font-size:13px;color:var(--muted);text-align:center;margin-bottom:24px}
.role-wrap{display:flex;gap:8px;margin-bottom:18px}
.role-btn{flex:1;padding:10px;border-radius:10px;border:1.5px solid var(--border2);background:rgba(255,255,255,0.03);color:var(--muted2);font-size:13px;font-weight:500;cursor:pointer;text-align:center;transition:all 0.2s;font-family:var(--font)}
.role-btn.on{border-color:rgba(244,63,94,0.4);color:var(--primary);background:rgba(244,63,94,0.08)}
.role-btn.ton.on{border-color:rgba(16,185,129,0.4);color:rgba(110,231,183,0.9);background:rgba(16,185,129,0.08)}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px}
.field input,.field select{width:100%;padding:11px 14px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-family:var(--font);outline:none;transition:border-color 0.2s}
.field input:focus,.field select:focus{border-color:rgba(244,63,94,0.4)}
.field input::placeholder{color:var(--muted2)}
.field select option{background:#1F0D18;color:var(--text)}
.submit{width:100%;padding:13px;background:linear-gradient(135deg,var(--pg),var(--sg));border:1px solid rgba(244,63,94,0.4);border-radius:10px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font);margin-top:4px;transition:opacity 0.2s}
.submit:hover{opacity:0.88}
.submit:disabled{opacity:0.5}
.err{color:rgba(252,165,165,0.9);font-size:13px;text-align:center;margin-top:10px;min-height:18px}
.switch{text-align:center;margin-top:18px;font-size:13px;color:var(--muted2)}
.switch a{color:var(--primary);text-decoration:none;font-weight:600}
.sp2{width:16px;height:16px;border:2px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:rn .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px}
@keyframes rn{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="orb o1"></div>
<div class="orb o2"></div>
<div class="card">
  <div class="lang-wrap">
    <button class="lb on" id="lvi" onclick="setLang('vi')">🇻🇳 VI</button>
    <button class="lb" id="len" onclick="setLang('en')">🇬🇧 EN</button>
  </div>
  <div class="brand"><span class="brand-text">Edu<span>Bot</span></span></div>
  <div class="title" id="title">Tạo tài khoản</div>
  <div class="subtitle" id="subtitle">Bắt đầu học với AI miễn phí</div>
  <div class="role-wrap">
    <button class="role-btn on" id="role-s" onclick="setRole('student')">🎒 <span id="rl-s">Học sinh</span></button>
    <button class="role-btn ton" id="role-t" onclick="setRole('teacher')">👩‍🏫 <span id="rl-t">Giáo viên</span></button>
  </div>
  <div class="field"><label id="l-name">Họ và tên</label><input type="text" id="inp-name" placeholder="Nguyễn Văn A"/></div>
  <div class="field" id="f-grade"><label id="l-grade">Lớp</label><select id="inp-grade"><option value="1">Lớp 1</option><option value="2">Lớp 2</option><option value="3">Lớp 3</option><option value="4">Lớp 4</option><option value="5">Lớp 5</option><option value="6">Lớp 6</option><option value="7">Lớp 7</option><option value="8">Lớp 8</option><option value="9">Lớp 9</option><option value="10">Lớp 10</option><option value="11">Lớp 11</option><option value="12">Lớp 12</option></select></div>
  <div class="field" id="f-inst" style="display:none"><label id="l-inst">Trường / Tổ chức</label><input type="text" id="inp-inst" placeholder="Trường THPT Nguyễn Trãi"/></div>
  <div class="field"><label>Email</label><input type="email" id="inp-email" placeholder="email@example.com"/></div>
  <div class="field"><label id="l-pw">Mật khẩu</label><input type="password" id="inp-pw" placeholder="••••••••"/></div>
  <button class="submit" id="btn-submit" onclick="doReg()">Đăng ký miễn phí</button>
  <div class="err" id="err"></div>
  <div class="switch" id="sw">Đã có tài khoản? <a href="/login" id="sw-link">Đăng nhập</a></div>
</div>
<script>
var API='https://edubot-vietnam.onrender.com';
var lang=localStorage.getItem('eb_lang')||'vi';
var role='student';
var T={vi:{'title':'Tạo tài khoản','subtitle':'Bắt đầu học với AI miễn phí','rl-s':'Học sinh','rl-t':'Giáo viên','l-name':'Họ và tên','inp-name':'Nguyễn Văn A','l-grade':'Lớp','l-inst':'Trường / Tổ chức','inp-inst':'Trường THPT Nguyễn Trãi','l-pw':'Mật khẩu','btn':'Đăng ký miễn phí','sw':'Đã có tài khoản?','sw-link':'Đăng nhập','err-ep':'Vui lòng điền đầy đủ thông tin.','err-name':'Vui lòng nhập họ tên.','err-pw':'Mật khẩu tối thiểu 6 ký tự.','err-email':'Email không hợp lệ.'},en:{'title':'Create Account','subtitle':'Start learning with AI for free','rl-s':'Student','rl-t':'Teacher','l-name':'Full Name','inp-name':'John Smith','l-grade':'Grade','l-inst':'School / Institution','inp-inst':'Nguyen Trai High School','l-pw':'Password','btn':'Sign up free','sw':'Already have an account?','sw-link':'Login','err-ep':'Please fill in all fields.','err-name':'Please enter your name.','err-pw':'Password must be at least 6 characters.','err-email':'Invalid email address.'}};
function t(k){return T[lang][k]||T['vi'][k]||k;}
function setLang(l){lang=l;localStorage.setItem('eb_lang',l);document.getElementById('lvi').className='lb'+(l==='vi'?' on':'');document.getElementById('len').className='lb'+(l==='en'?' on':'');applyLang();}
function applyLang(){['title','subtitle','rl-s','rl-t','l-name','l-grade','l-inst','l-pw'].forEach(function(k){var el=document.getElementById(k);if(el)el.textContent=t(k);});['inp-name','inp-inst'].forEach(function(k){var el=document.getElementById(k);if(el)el.placeholder=t(k);});document.getElementById('btn-submit').textContent=t('btn');document.getElementById('sw').innerHTML=t('sw')+' <a href="/login">'+t('sw-link')+'</a>';}
function setRole(r){role=r;document.getElementById('role-s').className='role-btn'+(r==='student'?' on':'');document.getElementById('role-t').className='role-btn ton'+(r==='teacher'?' on':'');document.getElementById('f-grade').style.display=r==='student'?'block':'none';document.getElementById('f-inst').style.display=r==='teacher'?'block':'none';}
async function doReg(){
  var email=document.getElementById('inp-email').value.trim();var pw=document.getElementById('inp-pw').value;var name=document.getElementById('inp-name').value.trim();
  var err=document.getElementById('err');var btn=document.getElementById('btn-submit');
  if(!email||!pw||!name){err.textContent=t('err-ep');return;}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){err.textContent=t('err-email');return;}
  if(pw.length<6){err.textContent=t('err-pw');return;}
  btn.disabled=true;btn.innerHTML='<span class="sp2"></span>'+t('btn')+'...';err.textContent='';
  try{
    var body={email,password:pw,name,role};
    if(role==='student')body.grade=parseInt(document.getElementById('inp-grade').value);
    else body.institution=document.getElementById('inp-inst').value.trim();
    var res=await fetch(API+'/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    var data=await res.json();if(!res.ok)throw new Error(data.error||'Error');
    localStorage.setItem('eb_tok',data.token);localStorage.setItem('eb_name',data.user.name);localStorage.setItem('eb_role',data.user.role);
    window.location.href='/app';
  }catch(e){err.textContent=e.message;}
  finally{btn.disabled=false;btn.textContent=t('btn');}
}
var urlp=new URLSearchParams(window.location.search);
if(urlp.get('role')==='teacher')setRole('teacher');
document.addEventListener('keydown',function(e){if(e.key==='Enter')doReg();});
setLang(lang);
</script>
</body>
</html>
