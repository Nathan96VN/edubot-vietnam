<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>StellaStride — Đăng nhập</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F9FF;--primary:#00B4A6;--secondary:#7B8CDE;
  --pg:rgba(0,180,166,0.8);--sg:rgba(123,140,222,0.6);
  --card:rgba(0,180,166,0.05);--border:rgba(0,180,166,0.15);
  --border2:rgba(0,180,166,0.08);--text:#1E1B4B;
  --muted:rgba(45,45,45,0.6);--muted2:rgba(30,27,75,0.4);
  --font:'Poppins',system-ui,sans-serif;
}
html,body{min-height:100vh;background:#F5F9FF;color:var(--text);font-family:var(--font);display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden}
.orb{position:fixed;border-radius:50%;pointer-events:none}
.o1{width:500px;height:500px;background:radial-gradient(circle,rgba(0,180,166,0.12),transparent 70%);top:-150px;right:-100px}
.o2{width:350px;height:350px;background:radial-gradient(circle,rgba(123,140,222,0.1),transparent 70%);bottom:-80px;left:-60px}
.card{background:#ffffff;backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:20px;padding:36px 32px;width:100%;max-width:400px;position:relative;z-index:1}
.lang-wrap{display:flex;justify-content:center;background:rgba(0,180,166,0.04);border:1px solid var(--border2);border-radius:20px;overflow:hidden;width:fit-content;margin:0 auto 24px}
.lb{padding:6px 16px;font-size:12px;font-weight:600;border:none;background:transparent;color:var(--muted2);cursor:pointer;font-family:var(--font)}
.lb.on{background:linear-gradient(135deg,var(--pg),var(--sg));color:#1E1B4B}
.brand{text-align:center;margin-bottom:24px}
.brand-text{font-size:26px;font-weight:800;color:#1E1B4B}
.brand-text span{color:#00B4A6;-webkit-text-fill-color:#00B4A6}
.title{font-size:22px;font-weight:700;text-align:center;margin-bottom:6px;color:#1E1B4B}
.subtitle{font-size:13px;color:var(--muted);text-align:center;margin-bottom:28px}
.tabs{display:flex;background:rgba(0,180,166,0.02);border:1px solid var(--border2);border-radius:10px;padding:3px;margin-bottom:22px}
.tab{flex:1;padding:8px;text-align:center;border:none;background:transparent;color:var(--muted2);font-size:13px;font-weight:500;border-radius:8px;cursor:pointer;font-family:var(--font);transition:all 0.2s}
.tab.on{background:linear-gradient(135deg,var(--pg),var(--sg));color:#1E1B4B}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px}
.field input,.field select{width:100%;padding:11px 14px;background:rgba(0,180,166,0.04);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-family:var(--font);outline:none;transition:border-color 0.2s}
.field input:focus,.field select:focus{border-color:rgba(0,180,166,0.4)}
.field input::placeholder{color:var(--muted2)}
.field select option{background:#ffffff;color:#1E1B4B}
.role-wrap{display:flex;gap:8px;margin-bottom:18px}
.role-btn{flex:1;padding:10px;border-radius:10px;border:1.5px solid var(--border2);background:rgba(0,180,166,0.02);color:var(--muted2);font-size:13px;font-weight:500;cursor:pointer;text-align:center;transition:all 0.2s;font-family:var(--font)}
.role-btn.on{border-color:rgba(0,180,166,0.4);color:var(--primary);background:rgba(0,180,166,0.08)}
.role-btn.ton.on{border-color:rgba(16,185,129,0.4);color:rgba(110,231,183,0.9);background:rgba(16,185,129,0.08)}
.submit{width:100%;padding:13px;background:linear-gradient(135deg,var(--pg),var(--sg));border:1px solid rgba(0,180,166,0.4);border-radius:10px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font);margin-top:4px;transition:opacity 0.2s}
.submit:hover{opacity:0.88}
.submit:disabled{opacity:0.5;cursor:not-allowed}
.err{color:rgba(252,165,165,0.9);font-size:13px;text-align:center;margin-top:10px;min-height:18px}
.switch{text-align:center;margin-top:18px;font-size:13px;color:var(--muted2)}
.switch a{color:var(--primary);text-decoration:none;font-weight:600}
.switch a:hover{text-decoration:underline}
.divider{height:1px;background:rgba(0,180,166,0.1);margin:18px 0}
.sp2{width:16px;height:16px;border:2px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:rn .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px}
@keyframes rn{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="orb o1"></div>
<div class="orb o2"></div>

<div class="card">
  <div class="lang-wrap">
    <button class="lb on" id="lvi" onclick="setLang('vi')">🇻🇳 VI</button>
    <button class="lb" id="len" onclick="setLang('en')">🇬🇧 EN</button>
  </div>
  <div class="brand"><span class="brand-text">Stella<span>Stride</span></span></div>
  <div class="tabs">
    <button class="tab on" id="tab-login" onclick="setMode('login')" id="t0">Đăng nhập</button>
    <button class="tab" id="tab-reg" onclick="setMode('reg')" id="t1">Đăng ký</button>
  </div>

  <!-- Role selector (register only) -->
  <div id="role-wrap" class="role-wrap" style="display:none">
    <button class="role-btn on" id="role-s" onclick="setRole('student')">🎒 <span id="rl-s">Học sinh</span></button>
    <button class="role-btn ton" id="role-t" onclick="setRole('teacher')">👩‍🏫 <span id="rl-t">Giáo viên</span></button>
  </div>

  <!-- Name (register only) -->
  <div class="field" id="f-name" style="display:none">
    <label id="l-name">Họ và tên</label>
    <input type="text" id="inp-name" placeholder="Nguyễn Văn A"/>
  </div>

  <!-- Grade (student register only) -->
  <div class="field" id="f-grade" style="display:none">
    <label id="l-grade">Lớp</label>
    <select id="inp-grade">
      <option value="1">Lớp 1</option><option value="2">Lớp 2</option><option value="3">Lớp 3</option>
      <option value="4">Lớp 4</option><option value="5">Lớp 5</option><option value="6">Lớp 6</option>
      <option value="7">Lớp 7</option><option value="8">Lớp 8</option><option value="9">Lớp 9</option>
      <option value="10">Lớp 10</option><option value="11">Lớp 11</option><option value="12">Lớp 12</option>
    </select>
  </div>

  <!-- Institution (teacher register only) -->
  <div class="field" id="f-inst" style="display:none">
    <label id="l-inst">Trường / Tổ chức</label>
    <input type="text" id="inp-inst" placeholder="Trường THPT Nguyễn Trãi"/>
  </div>

  <!-- Email -->
  <div class="field">
    <label>Email</label>
    <input type="email" id="inp-email" placeholder="email@example.com"/>
  </div>

  <!-- Password -->
  <div class="field">
    <label id="l-pw">Mật khẩu</label>
    <input type="password" id="inp-pw" placeholder="••••••••"/>
  </div>

  <button class="submit" id="btn-submit" onclick="doAuth()">Đăng nhập</button>
  <div class="err" id="err"></div>
  <div class="switch" id="sw">Chưa có tài khoản? <a href="#" onclick="setMode('reg');return false;" id="sw-link">Đăng ký miễn phí</a></div>
</div>

<script>
var API = 'https://edubot-vietnam.onrender.com';
var lang = localStorage.getItem('eb_lang') || 'vi';
var mode = 'login';
var role = 'student';

var T = {
  vi: {
    't0':'Đăng nhập','t1':'Đăng ký',
    'rl-s':'Học sinh','rl-t':'Giáo viên',
    'l-name':'Họ và tên','inp-name':'Nguyễn Văn A',
    'l-grade':'Lớp','l-inst':'Trường / Tổ chức','inp-inst':'Trường THPT Nguyễn Trãi',
    'l-pw':'Mật khẩu',
    'btn-login':'Đăng nhập','btn-reg':'Đăng ký',
    'sw-login':'Chưa có tài khoản?','sw-login-link':'Đăng ký miễn phí',
    'sw-reg':'Đã có tài khoản?','sw-reg-link':'Đăng nhập',
    'err-ep':'Vui lòng nhập email và mật khẩu.',
    'err-name':'Vui lòng nhập họ tên.',
    'err-pw':'Mật khẩu tối thiểu 6 ký tự.',
    'err-email':'Email không hợp lệ.',
  },
  en: {
    't0':'Login','t1':'Sign Up',
    'rl-s':'Student','rl-t':'Teacher',
    'l-name':'Full Name','inp-name':'John Smith',
    'l-grade':'Grade','l-inst':'School / Institution','inp-inst':'Nguyen Trai High School',
    'l-pw':'Password',
    'btn-login':'Login','btn-reg':'Sign Up',
    'sw-login':"Don't have an account?",'sw-login-link':'Sign up free',
    'sw-reg':'Already have an account?','sw-reg-link':'Login',
    'err-ep':'Please enter your email and password.',
    'err-name':'Please enter your name.',
    'err-pw':'Password must be at least 6 characters.',
    'err-email':'Invalid email address.',
  }
};

function t(k){ return T[lang][k] || T['vi'][k] || k; }

function setLang(l){
  lang = l;
  localStorage.setItem('eb_lang', l);
  document.getElementById('lvi').className = 'lb' + (l==='vi'?' on':'');
  document.getElementById('len').className = 'lb' + (l==='en'?' on':'');
  applyLang();
}

function applyLang(){
  ['t0','t1','rl-s','rl-t','l-name','l-grade','l-inst','l-pw'].forEach(function(k){
    var el = document.getElementById(k); if(el) el.textContent = t(k);
  });
  ['inp-name','inp-inst'].forEach(function(k){
    var el = document.getElementById(k); if(el) el.placeholder = t(k);
  });
  updateMode();
}

function setMode(m){
  mode = m;
  document.getElementById('tab-login').className = 'tab' + (m==='login'?' on':'');
  document.getElementById('tab-reg').className = 'tab' + (m==='reg'?' on':'');
  updateMode();
}

function setRole(r){
  role = r;
  document.getElementById('role-s').className = 'role-btn' + (r==='student'?' on':'');
  document.getElementById('role-t').className = 'role-btn ton' + (r==='teacher'?' on':'');
  document.getElementById('f-grade').style.display = r==='student' ? 'block' : 'none';
  document.getElementById('f-inst').style.display = r==='teacher' ? 'block' : 'none';
}

function updateMode(){
  var isReg = mode === 'reg';
  document.getElementById('role-wrap').style.display = isReg ? 'flex' : 'none';
  document.getElementById('f-name').style.display = isReg ? 'block' : 'none';
  document.getElementById('f-grade').style.display = isReg && role==='student' ? 'block' : 'none';
  document.getElementById('f-inst').style.display = isReg && role==='teacher' ? 'block' : 'none';
  document.getElementById('btn-submit').textContent = t(isReg ? 'btn-reg' : 'btn-login');
  var sw = document.getElementById('sw');
  var swl = document.getElementById('sw-link');
  if(isReg){
    sw.innerHTML = t('sw-reg') + ' <a href="#" onclick="setMode(\'login\');return false;">' + t('sw-reg-link') + '</a>';
  } else {
    sw.innerHTML = t('sw-login') + ' <a href="#" onclick="setMode(\'reg\');return false;">' + t('sw-login-link') + '</a>';
  }
  document.getElementById('err').textContent = '';
}

async function doAuth(){
  var email = document.getElementById('inp-email').value.trim();
  var pw = document.getElementById('inp-pw').value;
  var err = document.getElementById('err');
  var btn = document.getElementById('btn-submit');
  var emailReg = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if(!email || !pw){ err.textContent = t('err-ep'); return; }
  if(!emailReg.test(email)){ err.textContent = t('err-email'); return; }
  if(pw.length < 6){ err.textContent = t('err-pw'); return; }
  if(mode==='reg'){
    var name = document.getElementById('inp-name').value.trim();
    if(!name){ err.textContent = t('err-name'); return; }
  }
  btn.disabled = true;
  btn.innerHTML = '<span class="sp2"></span>' + (mode==='reg' ? t('btn-reg') : t('btn-login')) + '...';
  err.textContent = '';
  try{
    var body, ep;
    if(mode==='reg'){
      ep = '/auth/register';
      body = { email, password:pw, name:document.getElementById('inp-name').value.trim(), role };
      if(role==='student') body.grade = parseInt(document.getElementById('inp-grade').value);
      else body.institution = document.getElementById('inp-inst').value.trim();
    } else {
      ep = '/auth/login';
      body = { email, password:pw };
    }
    var res = await fetch(API+ep, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    var data = await res.json();
    if(!res.ok) throw new Error(data.error || 'Error');
    localStorage.setItem('eb_tok', data.token);
    localStorage.setItem('eb_name', data.user.name);
    localStorage.setItem('eb_role', data.user.role);
    window.location.href = '/app';
  } catch(e){
    err.textContent = e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = t(mode==='reg' ? 'btn-reg' : 'btn-login');
  }
}

// Enter key
document.addEventListener('keydown', function(e){ if(e.key==='Enter') doAuth(); });

// Check URL for role param
var urlp = new URLSearchParams(window.location.search);
if(urlp.get('role') === 'teacher'){ setMode('reg'); setRole('teacher'); }
else if(urlp.get('role') === 'student'){ setMode('reg'); }

setLang(lang);
</script>
</body>
</html>
