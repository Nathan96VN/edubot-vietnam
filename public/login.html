<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>StellaStride — Đăng nhập</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1E1B4B;--navy-line:#312E6B;--primary:#00B4A6;--primary-dark:#009488;--secondary:#7B8CDE;
  --text:#1E1B4B;--muted:rgba(45,45,45,0.6);--muted2:rgba(30,27,75,0.4);
  --border:#E0E0E5;--font:'Poppins',system-ui,sans-serif;
}
html,body{min-height:100vh;background:#fff;color:var(--text);font-family:var(--font)}
.screen{min-height:100vh;display:grid;grid-template-columns:1fr 1fr}

/* LEFT — starfield panel */
.starpanel{background:var(--navy);position:relative;overflow:hidden;padding:56px;display:flex;flex-direction:column;justify-content:space-between;color:#fff}
.sp-brand{font-weight:900;font-size:26px;letter-spacing:.5px;position:relative;z-index:2}
.sp-brand span{color:var(--primary)}
.sp-tag{color:var(--secondary);font-size:17px;line-height:1.55;max-width:340px;position:relative;z-index:2}
.stars{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:70%;max-width:520px;opacity:.95}
.tw{animation:tw 3s ease-in-out infinite}
.tw:nth-child(6){animation-delay:.5s}.tw:nth-child(7){animation-delay:1s}
.tw:nth-child(8){animation-delay:1.5s}.tw:nth-child(9){animation-delay:2s}
@keyframes tw{0%,100%{opacity:.4}50%{opacity:1}}
.dust{position:absolute;border-radius:50%;background:#fff}

/* RIGHT — form panel */
.formpanel{background:#fff;display:flex;align-items:center;justify-content:center;padding:48px}
.card{width:100%;max-width:380px;position:relative;z-index:1}
.lang-wrap{display:flex;justify-content:center;border:1px solid var(--border);overflow:hidden;width:fit-content;margin:0 auto 24px}
.lb{padding:6px 16px;font-size:12px;font-weight:600;border:none;background:transparent;color:var(--muted2);cursor:pointer;font-family:var(--font)}
.lb.on{background:var(--primary);color:#fff}
.brand{text-align:center;margin-bottom:22px}
.brand-text{font-size:24px;font-weight:900;color:var(--navy)}
.brand-text span{color:var(--primary)}
.tabs{display:flex;border:1px solid var(--border);padding:3px;margin-bottom:22px}
.tab{flex:1;padding:9px;text-align:center;border:none;background:transparent;color:var(--muted2);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font);transition:all 0.2s}
.tab.on{background:var(--primary);color:#fff}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px}
.field input,.field select{width:100%;padding:12px 14px;background:#fff;border:1px solid var(--border);color:var(--text);font-size:14px;font-family:var(--font);outline:none;transition:border-color 0.2s}
.field input:focus,.field select:focus{border-color:var(--primary)}
.field input::placeholder{color:#bbb}
.field select option{background:#fff;color:var(--text)}
.role-wrap{display:flex;gap:8px;margin-bottom:18px}
.role-btn{flex:1;padding:11px;border:1.5px solid var(--border);background:#fff;color:var(--muted2);font-size:13px;font-weight:500;cursor:pointer;text-align:center;transition:all 0.2s;font-family:var(--font)}
.role-btn.on{border-color:var(--primary);color:var(--primary);background:rgba(0,180,166,0.06)}
.role-btn.ton.on{border-color:var(--secondary);color:var(--secondary);background:rgba(123,140,222,0.08)}
.submit{width:100%;padding:14px;background:var(--primary);border:none;color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font);margin-top:4px;transition:background 0.2s}
.submit:hover{background:var(--primary-dark)}
.submit:disabled{opacity:0.5;cursor:not-allowed}
.err{color:#C0392B;font-size:13px;text-align:center;margin-top:10px;min-height:18px}
.switch{text-align:center;margin-top:18px;font-size:13px;color:var(--muted2)}
.switch a{color:var(--primary);text-decoration:none;font-weight:600}
.switch a:hover{text-decoration:underline}
.sp2{width:16px;height:16px;border:2px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:rn .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px}
@keyframes rn{to{transform:rotate(360deg)}}

@media(max-width:760px){
  .screen{grid-template-columns:1fr;grid-template-rows:32vh 1fr}
  .starpanel{padding:32px}.sp-tag{font-size:14px}.formpanel{padding:36px 24px}
}
</style>
</head>
<body>
<div class="screen">

  <div class="starpanel" id="starpanel">
    <div class="sp-brand">Stella<span>Stride</span></div>
    <svg class="stars" viewBox="0 0 260 220">
      <line x1="50" y1="55" x2="120" y2="38" stroke="var(--navy-line)" stroke-width="1.2"/>
      <line x1="120" y1="38" x2="165" y2="92" stroke="var(--navy-line)" stroke-width="1.2"/>
      <line x1="165" y1="92" x2="215" y2="72" stroke="var(--navy-line)" stroke-width="1.2"/>
      <line x1="165" y1="92" x2="135" y2="158" stroke="var(--navy-line)" stroke-width="1.2"/>
      <line x1="135" y1="158" x2="80" y2="175" stroke="var(--navy-line)" stroke-width="1.2"/>
      <circle class="tw" cx="50" cy="55" r="4.5" fill="var(--primary)"/>
      <circle class="tw" cx="120" cy="38" r="3" fill="var(--secondary)"/>
      <circle class="tw" cx="165" cy="92" r="5" fill="var(--primary)"/>
      <circle class="tw" cx="215" cy="72" r="3" fill="var(--secondary)"/>
      <circle class="tw" cx="135" cy="158" r="4" fill="var(--primary)"/>
      <circle class="tw" cx="80" cy="175" r="3.5" fill="var(--secondary)"/>
    </svg>
    <div class="sp-tag" id="sp-tag">Chart your course through every subject, one star at a time.</div>
  </div>

  <div class="formpanel">
  <div class="card">
    <div class="lang-wrap">
      <button class="lb on" id="lvi" onclick="setLang('vi')">🇻🇳 VI</button>
      <button class="lb" id="len" onclick="setLang('en')">🇬🇧 EN</button>
    </div>
    <div class="brand"><span class="brand-text">Stella<span>Stride</span></span></div>
    <div class="tabs">
      <button class="tab on" id="tab-login" onclick="setMode('login')"><span id="t0">Đăng nhập</span></button>
      <button class="tab" id="tab-reg" onclick="setMode('reg')"><span id="t1">Đăng ký</span></button>
    </div>

    <div id="role-wrap" class="role-wrap" style="display:none">
      <button class="role-btn on" id="role-s" onclick="setRole('student')">🎒 <span id="rl-s">Học sinh</span></button>
      <button class="role-btn ton" id="role-t" onclick="setRole('teacher')">👩‍🏫 <span id="rl-t">Giáo viên</span></button>
    </div>

    <div class="field" id="f-name" style="display:none">
      <label id="l-name">Họ và tên</label>
      <input type="text" id="inp-name" placeholder="Nguyễn Văn A"/>
    </div>

    <div class="field" id="f-grade" style="display:none">
      <label id="l-grade">Lớp</label>
      <select id="inp-grade">
        <option value="1" id="g1">Lớp 1</option><option value="2" id="g2">Lớp 2</option><option value="3" id="g3">Lớp 3</option>
        <option value="4" id="g4">Lớp 4</option><option value="5" id="g5">Lớp 5</option><option value="6" id="g6">Lớp 6</option>
        <option value="7" id="g7">Lớp 7</option><option value="8" id="g8">Lớp 8</option><option value="9" id="g9">Lớp 9</option>
        <option value="10" id="g10">Lớp 10</option><option value="11" id="g11">Lớp 11</option><option value="12" id="g12">Lớp 12</option>
      </select>
    </div>

    <div class="field" id="f-inst" style="display:none">
      <label id="l-inst">Trường / Tổ chức</label>
      <input type="text" id="inp-inst" placeholder="Trường THPT Nguyễn Trãi"/>
    </div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="inp-email" placeholder="email@example.com"/>
    </div>

    <div class="field">
      <label id="l-pw">Mật khẩu</label>
      <input type="password" id="inp-pw" placeholder="••••••••"/>
    </div>

    <button class="submit" id="btn-submit" onclick="doAuth()">Đăng nhập</button>
    <div class="err" id="err"></div>
    <div class="switch" id="sw">Chưa có tài khoản? <a href="#" onclick="setMode('reg');return false;" id="sw-link">Đăng ký miễn phí</a></div>
  </div>
  </div>

</div>

<script>
var API = 'https://edubot-vietnam.onrender.com';
var lang = localStorage.getItem('eb_lang') || 'vi';
var mode = 'login';
var role = 'student';

var T = {
  vi: {
    't0':'Đăng nhập','t1':'Đăng ký',
    'rl-s':'Học sinh','rl-t':'Giáo viên',
    'l-name':'Họ và tên','inp-name':'Nguyễn Văn A',
    'l-grade':'Lớp','l-inst':'Trường / Tổ chức','inp-inst':'Trường THPT Nguyễn Trãi',
    'l-pw':'Mật khẩu',
    'btn-login':'Đăng nhập','btn-reg':'Đăng ký',
    'sw-login':'Chưa có tài khoản?','sw-login-link':'Đăng ký miễn phí',
    'sw-reg':'Đã có tài khoản?','sw-reg-link':'Đăng nhập',
    'err-ep':'Vui lòng nhập email và mật khẩu.',
    'err-name':'Vui lòng nhập họ tên.',
    'err-pw':'Mật khẩu tối thiểu 6 ký tự.',
    'err-email':'Email không hợp lệ.',
  },
  en: {
    't0':'Login','t1':'Sign Up',
    'rl-s':'Student','rl-t':'Teacher',
    'l-name':'Full Name','inp-name':'John Smith',
    'l-grade':'Grade','l-inst':'School / Institution','inp-inst':'Nguyen Trai High School',
    'l-pw':'Password',
    'btn-login':'Login','btn-reg':'Sign Up',
    'sw-login':"Don't have an account?",'sw-login-link':'Sign up free',
    'sw-reg':'Already have an account?','sw-reg-link':'Login',
    'err-ep':'Please enter your email and password.',
    'err-name':'Please enter your name.',
    'err-pw':'Password must be at least 6 characters.',
    'err-email':'Invalid email address.',
  }
};

function t(k){ return T[lang][k] || T['vi'][k] || k; }

function setLang(l){
  lang = l;
  localStorage.setItem('eb_lang', l);
  document.getElementById('lvi').className = 'lb' + (l==='vi'?' on':'');
  document.getElementById('len').className = 'lb' + (l==='en'?' on':'');
  applyLang();
}

function applyLang(){
  ['t0','t1','rl-s','rl-t','l-name','l-grade','l-inst','l-pw'].forEach(function(k){
    var el = document.getElementById(k); if(el) el.textContent = t(k);
  });
  ['inp-name','inp-inst'].forEach(function(k){
    var el = document.getElementById(k); if(el) el.placeholder = t(k);
  });
  var prefix = lang==='en' ? 'Grade ' : 'Lớp ';
  for(var i=1;i<=12;i++){
    var el = document.getElementById('g'+i);
    if(el) el.textContent = prefix + i;
  }
  updateMode();
}

function setMode(m){
  mode = m;
  document.getElementById('tab-login').className = 'tab' + (m==='login'?' on':'');
  document.getElementById('tab-reg').className = 'tab' + (m==='reg'?' on':'');
  updateMode();
}

function setRole(r){
  role = r;
  document.getElementById('role-s').className = 'role-btn' + (r==='student'?' on':'');
  document.getElementById('role-t').className = 'role-btn ton' + (r==='teacher'?' on':'');
  document.getElementById('f-grade').style.display = r==='student' ? 'block' : 'none';
  document.getElementById('f-inst').style.display = r==='teacher' ? 'block' : 'none';
}

function updateMode(){
  var isReg = mode === 'reg';
  document.getElementById('role-wrap').style.display = isReg ? 'flex' : 'none';
  document.getElementById('f-name').style.display = isReg ? 'block' : 'none';
  document.getElementById('f-grade').style.display = isReg && role==='student' ? 'block' : 'none';
  document.getElementById('f-inst').style.display = isReg && role==='teacher' ? 'block' : 'none';
  document.getElementById('btn-submit').textContent = t(isReg ? 'btn-reg' : 'btn-login');
  var sw = document.getElementById('sw');
  var swl = document.getElementById('sw-link');
  if(isReg){
    sw.innerHTML = t('sw-reg') + ' <a href="#" onclick="setMode(\'login\');return false;">' + t('sw-reg-link') + '</a>';
  } else {
    sw.innerHTML = t('sw-login') + ' <a href="#" onclick="setMode(\'reg\');return false;">' + t('sw-login-link') + '</a>';
  }
  document.getElementById('err').textContent = '';
}

async function doAuth(){
  var email = document.getElementById('inp-email').value.trim();
  var pw = document.getElementById('inp-pw').value;
  var err = document.getElementById('err');
  var btn = document.getElementById('btn-submit');
  var emailReg = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if(!email || !pw){ err.textContent = t('err-ep'); return; }
  if(!emailReg.test(email)){ err.textContent = t('err-email'); return; }
  if(pw.length < 6){ err.textContent = t('err-pw'); return; }
  if(mode==='reg'){
    var name = document.getElementById('inp-name').value.trim();
    if(!name){ err.textContent = t('err-name'); return; }
  }
  btn.disabled = true;
  btn.innerHTML = '<span class="sp2"></span>' + (mode==='reg' ? t('btn-reg') : t('btn-login')) + '...';
  err.textContent = '';
  try{
    var body, ep;
    if(mode==='reg'){
      ep = '/auth/register';
      body = { email, password:pw, name:document.getElementById('inp-name').value.trim(), role };
      if(role==='student') body.grade = parseInt(document.getElementById('inp-grade').value);
      else body.institution = document.getElementById('inp-inst').value.trim();
    } else {
      ep = '/auth/login';
      body = { email, password:pw };
    }
    var res = await fetch(API+ep, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    var data = await res.json();
    if(!res.ok) throw new Error(data.error || 'Error');
    localStorage.setItem('eb_tok', data.token);
    localStorage.setItem('eb_name', data.user.name);
    localStorage.setItem('eb_role', data.user.role);
    window.location.href = '/app';
  } catch(e){
    err.textContent = e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = t(mode==='reg' ? 'btn-reg' : 'btn-login');
  }
}

document.addEventListener('keydown', function(e){ if(e.key==='Enter') doAuth(); });

var urlp = new URLSearchParams(window.location.search);
if(urlp.get('role') === 'teacher'){ setMode('reg'); setRole('teacher'); }
else if(urlp.get('role') === 'student'){ setMode('reg'); }

setLang(lang);

// ambient star dust
var sp = document.getElementById('starpanel');
for(var d=0; d<26; d++){
  var el = document.createElement('div');
  el.className = 'dust';
  var sz = Math.random()*2+1;
  el.style.width = el.style.height = sz+'px';
  el.style.left = Math.random()*100+'%';
  el.style.top = Math.random()*100+'%';
  el.style.opacity = (Math.random()*0.5+0.2).toFixed(2);
  sp.appendChild(el);
}
</script>
</body>
</html>
